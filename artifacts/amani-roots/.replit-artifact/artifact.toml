kind = "web"
previewPath = "/"
title = "Amani Roots Oils"
version = "1.0.0"
id = "artifacts/amani-roots"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24330
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/amani-roots run dev"

[services.env]
PORT = "24330"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/amani-roots", "run", "build"]
publicDir = "artifacts/amani-roots/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
